<head>
    <meta charset="UTF-8">
    <title>Number Generator</title>
    <style>
        .wrapper {
            display: flex;
            flex-wrap: wrap;
            width: 600px;
            gap: 4px;
        }

        .wrapper div {
            width: 80px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>Number Generator</h1>
        <div class="wrapper"></div>
    </main>


    <script>
        // Your code here
        // Hint: grab .wrapper, loop 0-100, createElement, set background, append

        const wrappers = document.querySelectorAll('.wrapper')

        wrappers.forEach((wrappers)=>{

     for (let i = 1; i <= 100; i++) {
        const box = document.createElement('div');
        box.classList.add('box');
        box.textContent = i; 
        
        wrapper.appendChild(box);
            }
        console.log(wrapper)
    
        })
    </script>
