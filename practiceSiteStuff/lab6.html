<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 6</title>
</head>
<body>
   
        <form id= "sienaIDForm">
            <label for="emailAddress">Siena College Email:</label>

            <input type="email"
                   id="emailAddress"
                   placeholder = "Enter your Siena Email"
                   required pattern =".+@siena\.edu"
                   title = "enter a valid siena email"
            >

            <label for="sienaID">Siena ID:</label>
            <input type="text"
                   id = "sienaID"
                   placeholder="Enter your Siena ID"
                   required pattern="98\d{6}"
                   title ="enter a valid id number"
            >
            <button type="submit">Submit</button>
            </form>

<script src="script.js" defer></script>
 
</body>
</html>
